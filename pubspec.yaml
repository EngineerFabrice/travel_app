name: travel_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.4

# ONLY ONE dependencies section!
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Add these packages for better UI
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.0
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# ONLY ONE flutter section!
flutter:
  uses-material-design: true

  # Assets section (UNCOMMENT this)
  assets:
    - assets/images/

